services:
  postgres:
    image: postgres:16-alpine
    container_name: ska-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ska

    ports:
      - "5432:5432"

    volumes:
      - ska_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ska"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ska_pg_data:
